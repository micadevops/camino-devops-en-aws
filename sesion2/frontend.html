<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Cero a Cloud · Lab EC2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #050A14;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: linear-gradient(160deg, #0F1432 0%, #080C1F 100%);
      border: 1px solid rgba(124,58,237,0.35);
      border-radius: 20px;
      padding: 52px 48px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,.45);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    input::placeholder { color: rgba(255,255,255,.3); }
    input:focus { border-color: rgba(124,58,237,.7); }
    button {
      width: 100%;
      padding: 14px;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #6D28D9; }
    .port-hint {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }
    .port-hint span { color: #7C3AED; font-family: monospace; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">De Cero a Cloud · Sesión 2</div>
    <h1>Deployá tu primera página</h1>
    <p class="sub">Ingresá tu nombre y el backend va a generar tu página personalizada.</p>
    <form action="BACKEND_URL/trophy" method="get">
      <input name="nombre" placeholder="Tu nombre" autocomplete="off" required>
      <button type="submit">Generar mi página →</button>
    </form>
    <p class="port-hint">
      Este form vive en <span>:80</span> · el backend vive en <span>:5000</span>
    </p>
  </div>
</body>
</html>
